<!-- app/presentation/templates/docs/service_docs.html -->
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <title>{{ service|title }} API — Swagger UI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/static/favicon.ico" type="image/x-icon" />
    <!-- Swagger UI CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5/swagger-ui.css" />
</head>
<body>
    <h1>{{ service|title }} API — Swagger UI</h1>
    <p>Интерактивная документация (Swagger)</p>
    <div id="swagger-ui"></div>

    <!-- Swagger UI Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
    <script>
        window.onload = function() {
            // Путь к openapi.json — подставляется через Jinja2
            const specUrl = "/{{ service }}/openapi.json";

            SwaggerUIBundle({
                url: specUrl,
                dom_id: '#swagger-ui',
                deepLinking: true,
                presets: [
                    SwaggerUIBundle.presets.apis,
                    SwaggerUIBundle.SwaggerUIStandalonePreset
                ],
                layout: "BaseLayout",
                docExpansion: "list",
                filter: false,
                syntaxHighlight: {
                    activate: true,
                    theme: "agate"
                }
            });
        };
    </script>
</body>
</html>
