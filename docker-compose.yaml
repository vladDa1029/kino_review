# Требуется стандартизировать настройки и ограничить некоторые параметры
services:
  pg:
    image: postgres:18.3-bookworm
    environment:
      POSTGRES_PASSWORD: password
      POSTGRES_DB: kino
      POSTGRES_USER: admin
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]
      interval: 5s
      timeout: 3s
      retries: 3
    ports: # Для разработки прокидуется ссылка для подключения в не контейнера
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql
      - ./docker/pg-init:/docker-entrypoint-initdb.d
    command: ["postgres", "-c", "listen_addresses=*"] # Для разработки слушает все порты
  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.org
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    depends_on:
      pg:
        condition: service_healthy
      broker:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin
  # Требуется добавить healthcheck
  auth:
    build:
      dockerfile: /Dockerfile
      context: ./backend/src/apps/auth
    
    # Порты для доступа если требуется
    # ports:
    #   - "8002:8001"
    depends_on:
      pg:
        condition: service_healthy
      broker:
        condition: service_healthy
    volumes:
      - ./backend/src/apps/auth/app:/app/app
    command: ["sh", "-c", "alembic upgrade head  && poetry run python -m uvicorn  main:setup_start_test_app --factory --host 0.0.0.0 --port 8001"]
  api-getaway:
    build:
      context: ./backend/src/apps/apigetaway
      dockerfile: /Dockerfile
    ports:
     - "8000:8000"
    volumes:
      - ./backend/src/apps/apigetaway/app:/app/app
    command: ["sh", "-c", "poetry run python -m uvicorn main:start_app_dev --port 8000 --host 0.0.0.0 --factory --reload"]
    depends_on:
      broker:
        condition: service_healthy
  
  user: # INFO: Сервис не готов
    build:
      dockerfile: /Dockerfile
      context: ./backend/src/apps/user
    
    # Порты для доступа если требуется
    # ports:
    #   - "8003:8002"
    depends_on:
      pg:
        condition: service_healthy
    volumes:
      - ./backend/src/apps/user/app:/app/app
    command: ["sh", "-c", "alembic upgrade head  && poetry run python -m uvicorn  main:start_app_dev --factory --host 0.0.0.0 --port 8002"]
  project: # INFO: Сервис не готов
    build:
      dockerfile: /Dockerfile
      context: ./backend/src/apps/project
    
    # Порты для доступа если требуется
    ports:
      - "8004:8003"
    depends_on:
      pg:
        condition: service_healthy
    environment:
      DATABASE_HOST: pg
      DATABASE_PORT_NETWORK: 5432
      USER_SERVICE_BASE_URL: http://user:8002
    volumes:
      - ./backend/src/apps/project/app:/app/app
    command: ["sh", "-c", "alembic upgrade head  && poetry run python -m uvicorn  main:start_app_dev --factory --host 0.0.0.0 --port 8003"]
  broker:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: "guest"
      RABBITMQ_DEFAULT_PASS: "guest"
    volumes:
      - broker-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 6
  

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"    
      - "9001:9001"    
    environment:
      MINIO_ROOT_USER: 
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --address ":9000" --console-address ":9001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    
networks:
  default:
    driver: bridge

volumes:
  pg_data:
  pgadmin_data:
  broker-data:
  minio_data:


